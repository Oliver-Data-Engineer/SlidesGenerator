<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Itaú Claro — Itaú Empresas</title>
  <style>
    @font-face { font-family:'Itau Display Pro';
      src:url('../../src/assets/fonts/itau-display-pro/ItauDisplayPro_W_Blk.woff2') format('woff2');
      font-weight:900; font-display:swap; }
    @font-face { font-family:'Itau Display Pro';
      src:url('../../src/assets/fonts/itau-display-pro/ItauDisplayPro_W_Lt.woff2') format('woff2');
      font-weight:300; font-display:swap; }

    :root {
      --bg:    #FFFFFF;
      --text:  #1A1A1A;
      --accent:#EC7000;
      --blue:  #1F3B6B;
      --sub:   #555555;
    }

    *{margin:0;padding:0;box-sizing:border-box;}
    body{width:100vw;height:100vh;overflow:hidden;
      background:var(--bg);
      font-family:'Itau Display Pro',system-ui,sans-serif;
      display:flex;align-items:center;justify-content:center;}

    .slide{width:100%;height:100%;display:flex;flex-direction:column;
      justify-content:center;padding:clamp(2rem,6vw,5rem);position:relative;
      border-left:6px solid var(--accent);}

    .tag{position:absolute;top:clamp(1.5rem,3vh,2.5rem);left:clamp(2rem,5vw,4rem);
      font-size:clamp(.6rem,1vw,.75rem);font-weight:900;letter-spacing:.15em;
      text-transform:uppercase;color:var(--accent);
      opacity:0;animation:up .5s .1s forwards;}

    .bar{width:clamp(40px,6vw,80px);height:4px;background:var(--accent);
      margin-bottom:clamp(1rem,2.5vh,2rem);opacity:0;animation:up .5s .3s forwards;}

    h1{font-size:clamp(2rem,6vw,5rem);font-weight:900;color:var(--blue);line-height:1.05;
      letter-spacing:-0.02em;opacity:0;animation:up .6s .5s forwards;}

    h1 span{color:var(--accent);}

    .sub{font-size:clamp(.9rem,2vw,1.4rem);font-weight:300;color:var(--sub);
      margin-top:clamp(.75rem,2vh,1.5rem);opacity:0;animation:up .6s .7s forwards;}

    .logo{position:absolute;bottom:clamp(1.5rem,3vh,2.5rem);right:clamp(2rem,5vw,4rem);
      height:clamp(24px,3vh,36px);opacity:0;animation:up .5s .9s forwards;}

    .footer-line{position:absolute;bottom:0;left:0;right:0;height:3px;
      background:var(--accent);}

    @keyframes up{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
  </style>
</head>
<body>
  <div class="slide">
    <span class="tag">Itaú Claro</span>
    <div class="bar"></div>
    <h1>Relatórios<br><span>Corporativos</span></h1>
    <p class="sub">Transparente, acessível, corporativo limpo — fundo branco</p>
    <img class="logo" src="../../src/assets/logos/logo-itau-laranja.png" alt="Itaú Empresas">
    <div class="footer-line"></div>
  </div>
</body>
</html>
