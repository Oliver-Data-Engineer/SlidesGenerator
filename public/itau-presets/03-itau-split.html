<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Itaú Split — Itaú Empresas</title>
  <style>
    @font-face { font-family:'Itau Display Pro';
      src:url('../../src/assets/fonts/itau-display-pro/ItauDisplayPro_W_Blk.woff2') format('woff2');
      font-weight:900; font-display:swap; }
    @font-face { font-family:'Itau Display Pro';
      src:url('../../src/assets/fonts/itau-display-pro/ItauDisplayPro_W_Lt.woff2') format('woff2');
      font-weight:300; font-display:swap; }

    *{margin:0;padding:0;box-sizing:border-box;}
    body{width:100vw;height:100vh;overflow:hidden;
      font-family:'Itau Display Pro',system-ui,sans-serif;}

    .slide{width:100%;height:100%;display:grid;grid-template-columns:30% 70%;position:relative;}

    .panel-dark{background:#1F3B6B;display:flex;flex-direction:column;
      justify-content:flex-end;padding:clamp(2rem,4vw,4rem);}

    .panel-light{background:#FFFFFF;display:flex;flex-direction:column;
      justify-content:center;padding:clamp(2rem,4vw,4rem);
      border-left:4px solid #EC7000;}

    .slide-num{font-size:clamp(3rem,8vw,7rem);font-weight:900;color:rgba(255,255,255,.08);
      line-height:1;opacity:0;animation:up .5s .1s forwards;}

    .tag{font-size:clamp(.6rem,1vw,.75rem);font-weight:900;letter-spacing:.15em;
      text-transform:uppercase;color:#EC7000;margin-bottom:clamp(.5rem,1.5vh,1rem);
      opacity:0;animation:up .5s .3s forwards;}

    .bar{width:clamp(32px,4vw,56px);height:4px;background:#EC7000;
      margin-bottom:clamp(.75rem,2vh,1.5rem);opacity:0;animation:up .5s .5s forwards;}

    h1{font-size:clamp(1.6rem,4.5vw,3.8rem);font-weight:900;color:#1A1A1A;line-height:1.05;
      letter-spacing:-0.02em;opacity:0;animation:up .6s .6s forwards;}

    h1 span{color:#EC7000;}

    .sub{font-size:clamp(.8rem,1.8vw,1.25rem);font-weight:300;color:#555555;
      margin-top:clamp(.5rem,1.5vh,1.2rem);opacity:0;animation:up .6s .8s forwards;}

    .logo-wrap{position:absolute;bottom:clamp(1.5rem,3vh,2.5rem);right:clamp(2rem,4vw,4rem);
      opacity:0;animation:up .5s 1s forwards;}

    .logo-wrap img{height:clamp(22px,3vh,32px);}

    @keyframes up{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
  </style>
</head>
<body>
  <div class="slide">
    <div class="panel-dark">
      <div class="slide-num">01</div>
    </div>
    <div class="panel-light">
      <span class="tag">Itaú Split</span>
      <div class="bar"></div>
      <h1>Pitch Deck<br><span>Moderno</span></h1>
      <p class="sub">Painel dividido — azul executivo + branco clean</p>
    </div>
    <div class="logo-wrap">
      <img src="../../src/assets/logos/logo-itau-branca.png" alt="Itaú Empresas">
    </div>
  </div>
</body>
</html>
