<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Swiss Modern — Itaú Empresas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;900&display=swap" rel="stylesheet">
  <style>
    @font-face { font-family:'Itau Display Pro';
      src:url('../../src/assets/fonts/itau-display-pro/ItauDisplayPro_W_Lt.woff2') format('woff2');
      font-weight:300; font-display:swap; }

    :root {
      --bg:    #FFFFFF;
      --text:  #1A1A1A;
      --accent:#EC7000;
      --sub:   #888888;
    }

    *{margin:0;padding:0;box-sizing:border-box;}
    body{width:100vw;height:100vh;overflow:hidden;
      background:var(--bg);
      font-family:'Archivo',system-ui,sans-serif;
      display:flex;align-items:center;justify-content:center;}

    .slide{width:100%;height:100%;display:flex;flex-direction:column;
      justify-content:center;padding:clamp(2rem,6vw,5rem);position:relative;}

    /* Linha vermelha suíça */
    .swiss-line{position:absolute;top:0;left:0;width:clamp(4px,0.4vw,6px);height:100%;
      background:var(--accent);opacity:0;animation:growLine .6s .1s forwards;}

    .tag{position:absolute;top:clamp(1.5rem,3vh,2.5rem);left:clamp(2rem,5vw,4rem);
      font-size:clamp(.6rem,1vw,.75rem);font-weight:900;letter-spacing:.2em;
      text-transform:uppercase;color:var(--accent);
      opacity:0;animation:up .5s .2s forwards;}

    .number{font-size:clamp(6rem,18vw,14rem);font-weight:900;color:rgba(0,0,0,0.04);
      line-height:1;position:absolute;right:clamp(2rem,5vw,4rem);top:50%;
      transform:translateY(-50%);user-select:none;pointer-events:none;}

    h1{font-size:clamp(2rem,6.5vw,5.5rem);font-weight:900;color:var(--text);line-height:1.0;
      letter-spacing:-0.03em;opacity:0;animation:up .6s .4s forwards;}

    h1 em{font-style:normal;color:var(--accent);}

    .sub{font-size:clamp(.85rem,1.8vw,1.25rem);font-weight:400;color:var(--sub);
      margin-top:clamp(1rem,2.5vh,2rem);max-width:min(50ch,80%);line-height:1.6;
      opacity:0;animation:up .6s .6s forwards;}

    .logo{position:absolute;bottom:clamp(1.5rem,3vh,2.5rem);right:clamp(2rem,5vw,4rem);
      height:clamp(24px,3vh,36px);opacity:0;animation:up .5s .8s forwards;}

    @keyframes up{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
    @keyframes growLine{from{transform:scaleY(0)}to{transform:scaleY(1)}}
  </style>
</head>
<body>
  <div class="slide">
    <div class="swiss-line"></div>
    <span class="tag">Swiss Modern</span>
    <div class="number">01</div>
    <h1>Clean.<br>Preciso.<br><em>Eficiente.</em></h1>
    <p class="sub">Minimalismo Bauhaus com laranja Itaú — grid rigoroso, tipografia forte, zero ruído</p>
    <img class="logo" src="../../src/assets/logos/logo-itau-laranja.png" alt="Itaú Empresas">
  </div>
</body>
</html>
